name: family_messenger
description: Private family messenger with chats and voice calls.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  cloud_functions: ^5.2.1
  firebase_storage: ^12.3.7
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  cupertino_icons: ^1.0.8
  # image_picker, record, just_audio — вернём с CocoaPods (см. README)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
